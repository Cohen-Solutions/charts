{{- if .Values.vm.network }}
{{- range .Values.vm.network.interfaces }}
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: {{ .nad }}
  namespace: {{ $.Values.vm.namespace }}
  labels:
    {{- include "olympus-vms.labels" $ | nindent 4 }}
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "{{ .nad }}",
      "type": "cnv-bridge",
      "bridge": "{{ .bridge | default "br-vm" }}",
      "vlan": {{ .vlan }},
{{- if .mtu }}
      "mtu": {{ .mtu }},
{{- end }}
      "ipam": {}
    }
{{- end }}
{{- end }}
