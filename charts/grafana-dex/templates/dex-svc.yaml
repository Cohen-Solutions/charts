---
{{- if .Values.dex.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "grafana-dex.fullname" .}}-dex
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "grafana-dex.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - name: dex
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app: dex
{{- end}}