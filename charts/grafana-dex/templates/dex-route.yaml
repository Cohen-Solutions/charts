---
{{- if .Values.dex.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  labels:
    {{ include "grafana-dex.labels" . | nindent 4 }}
  name: {{ include "grafana-dex.fullname" . }}-dex
spec:
  {{- $dexUrl := urlParse .Values.dex.dex_url }}
  host: {{ $dexUrl.host }}
  tls:
    termination: edge
  to:
    kind: Service
    name: {{ include "grafana-dex.fullname" .}}-dex
  port:
    targetPort: dex
{{- end }}