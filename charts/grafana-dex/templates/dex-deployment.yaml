---
{{- if .Values.dex.enabled }}
apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: {{ include "grafana-dex.fullname" . }}-oauth-sa-secret
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/service-account.name: {{ include "grafana-dex.fullname" . }}-oauth-sa
  labels:
  {{- include "grafana-dex.labels" . | nindent 4 }}
{{- end}}
---
{{- if .Values.dex.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "grafana-dex.fullname" . }}-oauth-sa
  namespace: {{ .Release.Namespace }}
  annotations:
    serviceaccounts.openshift.io/oauth-redirecturi.first: {{ .Values.dex.dex_url }}/dex/callback
  labels:
  {{- include "grafana-dex.labels" . | nindent 4 }}
{{- end}}
---
{{- if .Values.dex.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grafana-dex.fullname" .}}-dex
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "grafana-dex.labels" . | nindent 4 }}
data:
  config.yaml: |
    issuer: {{ .Values.dex.dex_url }}/dex
    storage:
      type: memory
    web:
      http: 0.0.0.0:8080
    logger:
      level: info
      format: text
    connectors:
    - type: openshift
      id: openshift
      name: OpenShift
      config:
        issuer: {{ .Values.dex.api_url }}
        clientID: system:serviceaccount:{{ .Release.Namespace }}:{{ include "grafana-dex.fullname" . }}-oauth-sa
        clientSecret: '{{ "{{" }} getenv "OPENSHIFT_CLIENT_SECRET" {{ "}}" }}'
        redirectURI: {{ .Values.dex.dex_url }}/dex/callback
        insecureCA: false
    oauth2:
      skipApprovalScreen: true
    staticClients:
    - name: 'grafana'
      id: grafana
      secret: grafanasecret
      redirectURIs:
      - https://{{ .Values.grafana.route.host }}/login/generic_oauth
{{- end}}
---
{{- if .Values.dex.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: dex
    {{- include "grafana-dex.labels" . | nindent 4 }}
  name: {{ include "grafana-dex.fullname" .}}-dex
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dex
  template:
    metadata:
      labels:
        app: dex
    spec:
      serviceAccountName: {{ include "grafana-dex.fullname" .}}-oauth-sa
      containers:
      - image: ghcr.io/dexidp/dex:v2.32.0
        name: dex
        # command: ["/usr/local/bin/dex", "serve", "/etc/dex/cfg/config.yaml"]
        command:
          - /usr/local/bin/docker-entrypoint
          - dex
          - serve
          - /etc/dex/cfg/config.yaml
        ports:
        - name: http
          containerPort: 8080

        volumeMounts:
        - name: config
          mountPath: /etc/dex/cfg
        - name: custom-ca-bundle-store
          mountPath: /etc/ssl/certs/
        env:
        - name: OPENSHIFT_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "grafana-dex.fullname" .}}-oauth-sa-secret
              key: token

        # readinessProbe:
        #   httpGet:
        #     path: /healthz
        #     port: 5556
        #     scheme: HTTP
      volumes:
      - name: config
        configMap:
          name: {{ include "grafana-dex.fullname" .}}-dex
          items:
          - key: config.yaml
            path: config.yaml
      - name: custom-ca-bundle-store
        secret:
          secretName: grafana-oauth-sa-secret
{{- end}}
---
{{- if .Values.dex.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "grafana-dex.fullname" .}}-dex
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "grafana-dex.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - name: dex
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app: dex
{{- end}}